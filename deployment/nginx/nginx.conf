user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # 上传文件大小限制
    client_max_body_size 10m;

    # API服务配置
    upstream backend {
        server backend:3000;
    }

    # HTTP重定向到HTTPS
    server {
        listen 80;
        server_name api.yourdomain.com admin.yourdomain.com;

        # 重定向到HTTPS
        return 301 https://$host$request_uri;
    }

    # API服务 - HTTPS
    server {
        listen 443 ssl http2;
        server_name api.yourdomain.com;

        # SSL证书配置
        ssl_certificate /etc/nginx/ssl/live/api.yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/api.yourdomain.com/privkey.pem;

        # SSL优化
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # 代理到后端服务
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # API文档
        location /api/docs {
            proxy_pass http://backend/api/docs;
            proxy_set_header Host $host;
        }

        # 健康检查
        location /api/health {
            proxy_pass http://backend/api/health;
            access_log off;
        }

        # 静态文件访问
        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            expires 30d;
            access_log off;
        }
    }

    # 管理后台 - HTTPS
    server {
        listen 443 ssl http2;
        server_name admin.yourdomain.com;

        # SSL证书配置
        ssl_certificate /etc/nginx/ssl/live/admin.yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/admin.yourdomain.com/privkey.pem;

        # SSL优化
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Content-Security-Policy "default-src 'self' https://api.yourdomain.com;";

        # 根目录
        root /usr/share/nginx/html/admin;
        index index.html;

        # 静态文件缓存
        location / {
            try_files $uri $uri/ /index.html;
            expires -1;
        }

        location /static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 代理API请求到后端
        location /api/ {
            proxy_pass https://api.yourdomain.com/;
            proxy_set_header Host api.yourdomain.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 不缓存HTML文件
        location ~* \.(html)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        }
    }

    # 默认server，返回404
    server {
        listen 80 default_server;
        listen 443 ssl http2 default_server;
        ssl_certificate /etc/nginx/ssl/default/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/default/privkey.pem;
        return 404;
    }
}